    <section class="page">

        <header class="page-header">

                <a href="skills.html">Skills</a>

        <form>
            <label>Your Name</label>
            <input type="text" placeholder="Enter your name">

                <option>Software Developer</option>

            <button type="submit">Send Message</button>
        </form>

    </section>
